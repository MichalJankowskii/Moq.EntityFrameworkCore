name: Build and Test

on:
  push:
    branches:
      - master
      - main
      - develop
    paths:
      - 'src/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - master
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BUILD_CONFIGURATION: Release
  EF_VERSION: 9.0.0

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full history for SourceLink
      
    - name: Set package version
      id: version
      run: |
        VERSION_BUILD_NUMBER=${{ github.run_number }}
        PACKAGE_VERSION="${EF_VERSION}.${VERSION_BUILD_NUMBER}"
        echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> $GITHUB_ENV
        echo "package_version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
        echo "Building version: ${PACKAGE_VERSION}"
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Display .NET version
      run: dotnet --version
    
    - name: Restore dependencies
      run: dotnet restore src/Moq.EntityFrameworkCore.sln
    
    - name: Build solution
      run: dotnet build src/Moq.EntityFrameworkCore.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore /p:ContinuousIntegrationBuild=true
    
    - name: Run tests
      run: dotnet test src/Moq.EntityFrameworkCore.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx"
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: '**/TestResults/**/*.trx'
        retention-days: 30
    
    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: '**/TestResults/**/coverage.cobertura.xml'
        retention-days: 30
    
    - name: Create NuGet package
      run: dotnet pack src/Moq.EntityFrameworkCore/Moq.EntityFrameworkCore.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output ./artifacts
    
    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg
        retention-days: 90

