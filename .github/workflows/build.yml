name: Build and Test

on:
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - master
    paths:
      - 'src/**'
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BUILD_CONFIGURATION: Release
  EF_VERSION: 9.0.0

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.version.outputs.package_version }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full history for SourceLink
      
    - name: Set package version
      id: version
      run: |
        VERSION_BUILD_NUMBER=${{ github.run_number }}
        PACKAGE_VERSION="${EF_VERSION}.${VERSION_BUILD_NUMBER}"
        echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> $GITHUB_ENV
        echo "package_version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
        echo "Building version: ${PACKAGE_VERSION}"
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Display .NET version
      run: dotnet --version
    
    - name: Restore dependencies
      run: dotnet restore src/Moq.EntityFrameworkCore.sln
    
    - name: Build solution
      run: dotnet build src/Moq.EntityFrameworkCore.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore /p:ContinuousIntegrationBuild=true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-output
        path: |
          src/**/bin/${{ env.BUILD_CONFIGURATION }}/**/*
          src/**/obj/**/*
        retention-days: 1
    
    - name: Create NuGet package
      run: dotnet pack src/Moq.EntityFrameworkCore/Moq.EntityFrameworkCore.csproj --configuration ${{ env.BUILD_CONFIGURATION }} --no-build -p:PackageVersion=${{ steps.version.outputs.package_version }} --output ./artifacts
    
    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg
        retention-days: 90
  
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore src/Moq.EntityFrameworkCore.sln
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-output
        path: src/
    
    - name: Run tests
      run: dotnet test src/Moq.EntityFrameworkCore.sln --configuration ${{ env.BUILD_CONFIGURATION }} --no-build --verbosity normal --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: TestResults/**/*.trx
        retention-days: 30
    
    - name: Upload coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: TestResults/**/coverage.cobertura.xml
        retention-days: 30
        if-no-files-found: warn

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [build, test]
    if: always()
    
    steps:
    - name: Download test results
      uses: actions/download-artifact@v4
      with:
        name: test-results
        path: ./TestResults
      continue-on-error: true
    
    - name: Download coverage reports
      uses: actions/download-artifact@v4
      with:
        name: coverage-reports
        path: ./Coverage
      continue-on-error: true
    
    - name: Install xmllint
      run: sudo apt-get update && sudo apt-get install -y libxml2-utils
    
    - name: Generate summary
      run: |
        echo "# Workflow Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Build information
        echo "## 📦 Build Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Package Version**: ${{ needs.build.outputs.package_version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Configuration**: ${{ env.BUILD_CONFIGURATION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Target Framework**: .NET ${{ env.DOTNET_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Entity Framework Version**: ${{ env.EF_VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Test results
        echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
        TRX_FILE=$(find ./TestResults -name "*.trx" -type f 2>/dev/null | head -n 1)
        if [ -n "$TRX_FILE" ] && [ -f "$TRX_FILE" ]; then
          # TRX files use namespaces, so we need to handle them properly
          TOTAL_TESTS=$(xmllint --xpath "count(//*[local-name()='UnitTestResult'])" "$TRX_FILE" 2>/dev/null || echo "0")
          PASSED_TESTS=$(xmllint --xpath "count(//*[local-name()='UnitTestResult' and @outcome='Passed'])" "$TRX_FILE" 2>/dev/null || echo "0")
          FAILED_TESTS=$(xmllint --xpath "count(//*[local-name()='UnitTestResult' and @outcome='Failed'])" "$TRX_FILE" 2>/dev/null || echo "0")
          SKIPPED_TESTS=$(xmllint --xpath "count(//*[local-name()='UnitTestResult' and @outcome='NotExecuted'])" "$TRX_FILE" 2>/dev/null || echo "0")
          
          echo "- **Total Tests**: $TOTAL_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- **Passed**: ✅ $PASSED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- **Failed**: ❌ $FAILED_TESTS" >> $GITHUB_STEP_SUMMARY
          echo "- **Skipped**: ⏭️ $SKIPPED_TESTS" >> $GITHUB_STEP_SUMMARY
          
          if [ "$FAILED_TESTS" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Some tests failed!**" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "- ⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Coverage information
        echo "## 📊 Code Coverage" >> $GITHUB_STEP_SUMMARY
        COVERAGE_FILE=$(find ./Coverage -name "coverage.cobertura.xml" -type f 2>/dev/null | head -n 1)
        if [ -n "$COVERAGE_FILE" ] && [ -f "$COVERAGE_FILE" ]; then
          LINE_RATE=$(xmllint --xpath "string(/coverage/@line-rate)" "$COVERAGE_FILE" 2>/dev/null || echo "0")
          BRANCH_RATE=$(xmllint --xpath "string(/coverage/@branch-rate)" "$COVERAGE_FILE" 2>/dev/null || echo "0")
          
          LINE_COVERAGE=$(awk "BEGIN {printf \"%.2f\", $LINE_RATE * 100}")
          BRANCH_COVERAGE=$(awk "BEGIN {printf \"%.2f\", $BRANCH_RATE * 100}")
          
          echo "- **Line Coverage**: ${LINE_COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch Coverage**: ${BRANCH_COVERAGE}%" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ⚠️ No coverage report found" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Job status
        echo "## ✅ Job Status" >> $GITHUB_STEP_SUMMARY
        echo "- **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Test**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Artifacts
        echo "## 📁 Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- NuGet Package (90 days retention)" >> $GITHUB_STEP_SUMMARY
        echo "- Test Results (30 days retention)" >> $GITHUB_STEP_SUMMARY
        echo "- Coverage Reports (30 days retention)" >> $GITHUB_STEP_SUMMARY

